<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>-- Hellfest 2K16 --</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/home.css">
</head>

<body>
    <!-- HEADER COMPONENT -->
    <header id="header"></header>

    <div class="focus-artistes">
        <img src="/src/assets/img/home/hellfest-home-annoucement-2016-10.jpg" alt="Hellfest 2016 home banner"
            class="banner-desktop">
        <img src="/src/assets/img/home/hellfest-home-annoucement-2016-10-mobile.jpg" alt="Hellfest 2016 home banner"
            class="banner-mobile">
    </div>

    <section class="call-home">
        <div class="container flex">
            <a href="/pages/artists.html" class="btn flex">
                <img src="/src/assets/img/home/arrow-strong.png">
                <span>Artistes</span>
            </a>
            <a href="#" class="btn">
                <img src="/src/assets/img/home/arrow-light.png">
                <span>Pass 3J complets</span>
            </a>
        </div>
    </section>

    <section class="focus-home">
        <div class="container grid">
            <a href="#">
                <img src="/src/assets/img/home/focus-cashless.jpg" alt="cashless link">
            </a>
            <a href="#">
                <img src="/src/assets/img/home/EMP-Hellfest2016-Web-361x335.gif" alt="EMP">
            </a>
            <div>
                <a href="#">
                    <img src="/src/assets/img/home/shop.jpg" alt="shop link">
                </a>
                <a href="#">
                    <img src="/src/assets/img/home/cult1.jpg" alt="cult link">
                </a>
            </div>
        </div>
    </section>

    <section class="actus-home">
        <div class="container grid col-3">
            <div class="content-news-item"></div>
            <div class="titre-actu-home"></div>
            <div class="hellfest-clan-container"></div>
        </div>
    </section>

    <!-- JS INDEX IMPORT SCRIPTS -->
    <script type="module" src="src/js/index.js"></script>

</html>
