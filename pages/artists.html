<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists - Hellfest Open Air</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/artists.css">
    <link rel="icon" href="src/assets/img/artists/favicon.png">
</head>

<body>
    <!-- HEADER COMPONENT -->
    <header id="header"></header>
    <section class="first-section">
        <img src="../src/assets/img/artists/artists-image-first-section.png" alt="hellfest pic">
    </section>

    <section class="filtre">
        <div class="dropdown-container">
            <button class="dropdown-btn">
                FILTRER PAR JOUR
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <ul class="dropdown-jour-semaine">
                <li>VENDREDI</li>
                <li>SAMEDI</li>
                <li>DIMANCHE</li>
            </ul>
        </div>

        <button id="customize">CUSTOMIZE YOUR RUNNING ORDER</button>
        <div class="artists-searchbar">
            <input class="artists-searchbar" type="text" placeholder="SEARCH">
            <button class="magnifying-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
    </section>

    <section class="artists">
        <article id="cards-container"></article>
        <article class="artists-container"></article>
    </section>

    <footer>

    </footer>


    <!-- JS INDEX IMPORT SCRIPTS -->
    <script type="module" src="../src/js/index.js"></script>
    <script type="module" src="../src/js/artists-cards.js"></script>
    <script src="https://kit.fontawesome.com/839fb27858.js" crossorigin="anonymous"></script>
</body>

</html>
